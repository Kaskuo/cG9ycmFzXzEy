<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASKUO — Signing in…</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: rgb(15, 15, 16);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(255,80,80,0.12);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 10px;
    padding: 16px 24px;
    text-align: center;
    max-width: 320px;
    font-size: 13px;
    color: rgba(255,120,120,0.9);
    letter-spacing: 0.02em;
    text-transform: none;
    line-height: 1.6;
    display: none;
  }
</style>
</head>
<body>

<div class="wrap" id="loadingWrap">
  <div class="spinner"></div>
  <span>Authenticating…</span>
</div>

<div class="error-box" id="errorBox"></div>

<script src="https://cdn.auth0.com/js/auth0/9.23/auth0.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {
  try {
    initAuth();
    await handleCallback();

    // Redirect to the streaming dashboard after successful login
    window.location.replace('dashboard.html');

  } catch (err) {
    console.error('[callback]', err);

    document.getElementById('loadingWrap').style.display = 'none';

    const box = document.getElementById('errorBox');
    box.textContent = 'Authentication failed: ' + (err.errorDescription || err.message || 'Unknown error.');
    box.style.display = 'block';

    // Auto-redirect back to login after 4 s
    setTimeout(() => { window.location.replace('index.html'); }, 4000);
  }
})();
</script>
</body>
</html>
