<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg"></div>

<div class="card" id="launchCard">
  <div class="user-center">
    <div class="avatar"></div>
    <span>User</span>
  </div>

  <div class="buttons">
    <button class="signup">Sign Up</button>
    <button class="login" onclick="showLogin()">Login</button>
  </div>
</div>

<div class="login-modal hidden" id="loginModal">
  <div class="login-box fade-in">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="login-btn">Login</button>

    <a class="forgot" href="#">Forgot password?</a>

    <div class="divider">or</div>

    <button class="oauth google">Continue with Google</button>
    <button class="oauth apple">Continue with Apple</button>

    <p class="terms">By continuing, you agree to Nomi's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
